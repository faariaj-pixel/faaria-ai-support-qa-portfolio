<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">n8n Multi-Agent Stock Workflow Canvas</title>
  <desc id="desc">A branded workflow canvas showing a chat trigger routed through an orchestrator into fundamental and technical analysis agents, both grounded by Gemini Search, then synthesized into a final stock analysis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#0b1f33"/>
      <stop offset="1" stop-color="#eafafa"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#72e5e5"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1055" cy="112" r="92" fill="#72e5e5" opacity=".12"/>
  <circle cx="100" cy="660" r="150" fill="#f7f4ee" opacity=".13"/>

  <text x="70" y="84" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#72e5e5">n8n Multi-Agent Stock Workflow</text>
  <text x="70" y="124" font-family="Arial, sans-serif" font-size="20" fill="#f7f4ee">Search-grounded stock analysis with specialized sub-agents</text>

  <rect x="70" y="230" width="235" height="108" rx="22" fill="#ffffff" filter="url(#s)"/>
  <text x="94" y="272" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0b1f33">Chat Trigger</text>
  <text x="94" y="306" font-family="Arial, sans-serif" font-size="16" fill="#3f5063">User asks about a stock</text>

  <rect x="380" y="230" width="255" height="108" rx="22" fill="#ffffff" filter="url(#s)"/>
  <text x="404" y="272" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0b1f33">Orchestrator</text>
  <text x="404" y="306" font-family="Arial, sans-serif" font-size="16" fill="#3f5063">Routes the analysis request</text>

  <rect x="725" y="170" width="340" height="94" rx="22" fill="#f7f4ee" filter="url(#s)"/>
  <text x="749" y="212" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0b1f33">Fundamental Agent</text>
  <text x="749" y="246" font-family="Arial, sans-serif" font-size="16" fill="#3f5063">Business, valuation, news context</text>

  <rect x="725" y="315" width="340" height="94" rx="22" fill="#f7f4ee" filter="url(#s)"/>
  <text x="749" y="357" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0b1f33">Technical Agent</text>
  <text x="749" y="391" font-family="Arial, sans-serif" font-size="16" fill="#3f5063">Price action, trend, signal context</text>

  <rect x="380" y="475" width="255" height="108" rx="22" fill="#ffffff" filter="url(#s)"/>
  <text x="404" y="517" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0b1f33">Gemini Search</text>
  <text x="404" y="551" font-family="Arial, sans-serif" font-size="16" fill="#3f5063">Required current-data grounding</text>

  <rect x="725" y="500" width="340" height="108" rx="22" fill="#ffffff" filter="url(#s)"/>
  <text x="749" y="542" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#0b1f33">Combined Analysis</text>
  <text x="749" y="576" font-family="Arial, sans-serif" font-size="16" fill="#3f5063">Bullish • Bearish • Neutral view</text>

  <path d="M305,284 C340,284 345,284 380,284" fill="none" stroke="#72e5e5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M635,278 C680,278 678,217 725,217" fill="none" stroke="#72e5e5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M635,294 C680,294 678,362 725,362" fill="none" stroke="#72e5e5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M508,338 C508,386 508,427 508,475" fill="none" stroke="#72e5e5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M635,529 C675,529 680,530 725,545" fill="none" stroke="#72e5e5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M895,264 C895,286 895,292 895,315" fill="none" stroke="#0b1f33" stroke-width="4" stroke-linecap="round" opacity=".55"/>
  <path d="M895,409 C895,442 895,463 895,500" fill="none" stroke="#0b1f33" stroke-width="4" stroke-linecap="round" opacity=".55" marker-end="url(#arrow)"/>

  <rect x="70" y="655" width="1060" height="46" rx="18" fill="#0b1f33" opacity=".88"/>
  <text x="94" y="684" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#f7f4ee">Quality control: each specialist must search first, separate analysis type, and return an auditable final view.</text>
</svg>
